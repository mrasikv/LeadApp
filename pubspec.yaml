name: lead_management_app
description: Enterprise-grade Multi-tenant Lead & Sales Management SaaS Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0
  cloud_functions: ^5.2.0
  firebase_storage: ^12.4.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Network & Data
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Navigation
  go_router: ^13.0.0
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Utilities
  intl: any # Pinned by flutter_localizations
  uuid: ^4.3.3
  logger: ^2.0.2+1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  dartz: ^0.10.1
  call_log: ^4.0.0
  
  # File handling & Excel
  file_picker: ^6.1.1
  excel: ^4.0.3

  # Forms & Validation
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.0.0

  # Charts & Analytics
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^28.1.38

  # Date & Time
  table_calendar: ^3.0.9
  time_range_picker: ^2.2.0

  # Icons & Design
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.6.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

